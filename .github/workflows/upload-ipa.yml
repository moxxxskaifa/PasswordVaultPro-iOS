name: Build IPA & Upload to App Store
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - name: Install Gradle 8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-8.10.2/bin" >> $GITHUB_PATH
      - name: Build iOS Framework
        run: gradle :composeApp:linkReleaseFrameworkIosArm64
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen generate
      - name: Import Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/ci.keychain-db
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/ci.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/ci.keychain-db
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASSWORD" -A -k $RUNNER_TEMP/ci.keychain-db
          security list-keychain -d user -s login.keychain $RUNNER_TEMP/ci.keychain-db
      - name: Install Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/wildcard.mobileprovision
      - name: Archive
        run: |
          xcodebuild -project Password Vault.xcodeproj -scheme iosApp -configuration Release \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates archive
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath $RUNNER_TEMP/IPA \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates
      - name: Upload to App Store
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ipa=$(ls $RUNNER_TEMP/IPA/*.ipa 2>/dev/null | head -1)
          if [ -n "$ipa" ]; then
            xcrun altool --upload-app -f "$ipa" -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD" --type ios
          else
            echo "No IPA found"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: PasswordVaultPro-IPA
          path: ${{ runner.temp }}/**/*.ipa
