name: Check Compile
on: [push]
jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Gradle
        run: brew install gradle
      - name: Android Debug
        run: gradle :composeApp:assembleDebug
      - name: iOS Framework
        run: gradle :composeApp:linkDebugFrameworkIosArm64
