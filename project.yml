name: PasswordVaultPro
options:
  bundleIdPrefix: com.passwordvault
  deploymentTarget: { iOS: "16.0" }
targets:
  iosApp:
    type: application
    platform: iOS
    sources: [iosApp]
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.passwordvault.app
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
    dependencies:
      - framework: ../composeApp/build/XCFrameworks/release/ComposeApp.xcframework
        embed: true
    preBuildScripts:
      - name: Build Compose framework
        script: cd "$SRCROOT/.."; ./gradlew :composeApp:assembleXCFramework
